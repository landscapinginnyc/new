<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="50%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#115e59"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Main title -->
  <text x="600" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="#ffffff">DSCR Loans</text>
  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="400" fill="#99f6e4">Debt Service Coverage Ratio Loan Guide</text>
  <!-- Divider -->
  <rect x="500" y="320" width="200" height="3" rx="1.5" fill="#99f6e4" opacity="0.6"/>
  <!-- Stats -->
  <text x="300" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="700" fill="#ffffff">650+</text>
  <text x="300" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="500" fill="#99f6e4">Cities</text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="700" fill="#ffffff">18</text>
  <text x="600" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="500" fill="#99f6e4">Loan Programs</text>
  <text x="900" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="700" fill="#ffffff">6</text>
  <text x="900" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="500" fill="#99f6e4">Offices Nationwide</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="600" fill="#ffffff" opacity="0.7">DebtServiceRatioLoan.com</text>
